"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true


[palettes.iris]
primary = "#4cd9e3"
surface = "#0d141c"
error = "#ffb4ab"

palette = "iris"

[package]
disabled = true

[character]
success_symbol = '[➜](bold green) '
error_symbol = '[✗](bold red) '

[cmd_duration]
min_time = 0
show_milliseconds = true
format = '[$duration](bold yellow)'

[directory]
truncation_length = 5
truncation_symbol = '../'
truncate_to_repo = false

[shell]
disabled = true

[status]
disabled = false
format = '[exit code: $status ]($style)'
